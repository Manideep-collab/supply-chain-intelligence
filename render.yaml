services:
  # FastAPI service
  - type: web
    name: supply-chain-api
    runtime: python
    buildCommand: pip install -r requirements_deploy.txt
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: supply-chain-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: supply-chain-db
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: supply-chain-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: supply-chain-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: supply-chain-db
          property: password

databases:
  # PostgreSQL database
  - name: supply-chain-db
    plan: free
    databaseName: supply_chain
    user: scadmin